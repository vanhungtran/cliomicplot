# Build and deploy pkgdown site to GitHub Pages
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  ai-spot-check:
    runs-on: ubuntu-latest
    name: AI-spot check
    steps:
      - uses: actions/checkout@v4
      - name: Scan for AI assistant artifacts
        run: |
          FAIL=0
          for pattern in \
            '.claude' 'CLAUDE.md' 'SESSION_SUMMARY.md' \
            '.codegraph' '.codebase-memory' \
            '.aiconfig' '.ai' '.cursor' '.copilot'; do
            if find . -maxdepth 3 -name "$pattern" -not -path './.git/*' | grep -q .; then
              echo "::error::AI artifact found: $pattern"
              FAIL=1
            fi
          done
          if grep -rqE 'Generated by (Claude|ChatGPT|Copilot|Gemini|AI)' \
            --include='*.R' --include='*.Rmd' . 2>/dev/null; then
            echo "::error::AI-generated marker found in source files"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "AI artifact scan PASSED"

  pkgdown:
    needs: ai-spot-check
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website
      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}
      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
