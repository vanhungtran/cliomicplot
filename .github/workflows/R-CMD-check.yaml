# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  ai-spot-check:
    runs-on: ubuntu-latest
    name: AI-spot check
    steps:
      - uses: actions/checkout@v4
      - name: Scan for AI assistant artifacts
        run: |
          echo "::group::Scanning for AI artifacts..."
          FAIL=0
          for pattern in \
            '.claude' 'CLAUDE.md' 'SESSION_SUMMARY.md' \
            '.codegraph' '.codebase-memory' \
            '.aiconfig' '.ai' '.cursor' '.copilot' \
            'AGENTS.md' 'GEMINI.md'; do
            if find . -maxdepth 3 -name "$pattern" -not -path './.git/*' | grep -q .; then
              echo "::error::AI artifact found: $pattern"
              find . -maxdepth 3 -name "$pattern" -not -path './.git/*'
              FAIL=1
            fi
          done
          if grep -rqE 'Generated by (Claude|ChatGPT|Copilot|Gemini|AI)' \
            --include='*.R' --include='*.Rmd' --include='*.md' . 2>/dev/null; then
            echo "::error::AI-generated marker found in source files"
            grep -rnE 'Generated by (Claude|ChatGPT|Copilot|Gemini|AI)' \
              --include='*.R' --include='*.Rmd' --include='*.md' .
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::AI artifact scan FAILED -- cannot proceed"
            exit 1
          fi
          echo "::endgroup::"
          echo "AI artifact scan PASSED"

  R-CMD-check:
    needs: ai-spot-check
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: macos-latest,   r: 'release'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
